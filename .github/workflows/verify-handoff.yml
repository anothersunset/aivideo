name: Verify Notion handoff

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify-handoff:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install ffmpeg and Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg git-lfs
          git lfs install

      - name: Pull required LFS media
        run: |
          git lfs pull \
            --include="anime_project/deliverables/current_demo/video/kage_current_demo.mp4,anime_project/deliverables/producer_demo_v02/video/kage_preview_with_local_polish.mp4,anime_project/deliverables/hq_provider_return_sim_v01/video/kage_preview_with_hq_sim_replacements.mp4,anime_project/episode_segments/act2_01_sample/final/act2_01_sample_limited_animation.mp4,anime_project/episode_segments/onsen_01_sample/final/onsen_01_sample_limited_animation.mp4,anime_project/media/act2_storyboard_v02/act2_storyboard_v02_animatic.mp4,anime_project/pipeline/mcp_video_gateway/local_sim_outputs/kling_i2v_rehearsal/anime_project/pipeline/external_results/chunks/kling_i2v/act2_01_sample/08-004/08-004_kling_i2v_chunk01.mp4,anime_project/pipeline/mcp_video_gateway/local_sim_outputs/kling_i2v_rehearsal/anime_project/pipeline/external_results/chunks/kling_i2v/onsen_01_sample/ON-008/ON-008_kling_i2v_chunk01.mp4,anime_project/pipeline/mcp_video_gateway/local_sim_outputs/kling_i2v_rehearsal/anime_project/pipeline/external_results/chunks/kling_i2v/onsen_01_sample/ON-008/ON-008_kling_i2v_chunk02.mp4" \
            --exclude=""

      - name: Compile Python agents
        run: python -m py_compile kage_studio_hub/*.py scripts/*.py

      - name: Check frontend JavaScript
        run: node --check kage_studio_hub/app.js

      - name: Verify GitHub/Notion handoff evidence
        run: python scripts/verify_notion_handoff.py
